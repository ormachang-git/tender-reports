<title>標案配發索引｜每日報表總覽</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI','PingFang TC','Microsoft JhengHei',sans-serif;
  background: #0f1117; color: #e2e8f0;
  padding: 24px; min-height: 100vh;
}

/* ── HEADER ── */
.header {
  background: linear-gradient(135deg, #0d1f3c 0%, #1a2744 100%);
  border: 1px solid #1e3a6e; border-radius: 12px;
  padding: 22px 28px; margin-bottom: 20px;
  display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 14px;
}
.header-left h1 { font-size: 1.4rem; color: #60a5fa; }
.header-left p  { font-size: 0.82rem; color: #64748b; margin-top: 5px; }
.header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
.today-badge {
  background: #1e3a5f; border: 1px solid #3b82f6;
  border-radius: 20px; padding: 5px 16px;
  font-size: 0.82rem; color: #93c5fd;
}



/* ── STATS ── */
.stats { display: grid; grid-template-columns: repeat(5,1fr); gap: 12px; margin-bottom: 20px; }
@media(max-width:700px){ .stats{ grid-template-columns:repeat(2,1fr); } }
.stat { background:#161b27; border:1px solid #1e2d45; border-radius:8px; padding:14px 16px; text-align:center; }
.stat .val { font-size:1.8rem; font-weight:700; }
.stat .val.blue   { color:#60a5fa; }
.stat .val.green  { color:#4ade80; }
.stat .val.yellow { color:#facc15; }
.stat .val.orange { color:#fb923c; }
.stat .lbl { font-size:0.73rem; color:#64748b; margin-top:3px; }

/* ── FILTER BAR ── */
.filter-bar {
  display: flex; gap: 8px; flex-wrap: wrap;
  align-items: center; margin-bottom: 16px;
}
.filter-bar input {
  flex: 1; min-width: 180px;
  background: #161b27; border: 1px solid #1e2d45;
  border-radius: 8px; padding: 8px 14px;
  color: #e2e8f0; font-size: 0.84rem; font-family: inherit;
  outline: none;
}
.filter-bar input:focus { border-color: #3b82f6; }
.filter-bar input::placeholder { color: #475569; }
.chip {
  font-size: 0.78rem; padding: 6px 14px; border-radius: 20px;
  cursor: pointer; border: 1px solid #1e2d45;
  background: #161b27; color: #475569; transition: all .15s;
  user-select: none;
}
.chip.active { background: #1e3a5f; border-color: #3b82f6; color: #93c5fd; }

/* ── TABLE ── */
.table-wrap { border-radius: 10px; border: 1px solid #1e2d45; overflow: hidden; }
table { width: 100%; border-collapse: collapse; }
thead tr { background: #111827; }
th {
  padding: 11px 14px; text-align: left;
  font-size: 0.74rem; font-weight:700; color: #64748b;
  letter-spacing:.06em; text-transform:uppercase;
  white-space: nowrap; border-bottom: 1px solid #1e2d45;
  cursor: pointer; user-select: none;
}
th:hover { color: #94a3b8; }
th.sort-asc::after  { content: ' ▲'; color: #3b82f6; }
th.sort-desc::after { content: ' ▼'; color: #3b82f6; }
td { padding: 12px 14px; border-bottom: 1px solid #111827; font-size: 0.84rem; color: #cbd5e1; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #13182280; }

.date-cell { font-weight: 600; color: #e2e8f0; white-space: nowrap; }
.date-sub  { font-size: 0.73rem; color: #475569; margin-top: 2px; }

.tag-high   { display:inline-flex;align-items:center;gap:3px;color:#4ade80;background:#14532d33;border:1px solid #22c55e55;border-radius:4px;padding:2px 8px;font-size:0.75rem;font-weight:600; }
.tag-mid    { display:inline-flex;align-items:center;gap:3px;color:#facc15;background:#71391233;border:1px solid #ca8a0455;border-radius:4px;padding:2px 8px;font-size:0.75rem;font-weight:600; }
.tag-low    { display:inline-flex;align-items:center;gap:3px;color:#f87171;background:#7f1d1d33;border:1px solid #ef444455;border-radius:4px;padding:2px 8px;font-size:0.75rem;font-weight:600; }
.tag-urgent { display:inline-block;font-size:0.68rem;background:#7f1d1d;color:#fca5a5;border-radius:3px;padding:1px 6px;margin-left:4px; }

.budget-total { color:#fbbf24; font-weight:600; }
.keywords { display:flex; flex-wrap:wrap; gap:4px; }
.kw { font-size:0.71rem; background:#1e293b; color:#7dd3fc; border:1px solid #0369a133; border-radius:3px; padding:1px 6px; }
.open-btn {
  display:inline-flex; align-items:center; gap:5px;
  color:#60a5fa; text-decoration:none;
  font-size:0.8rem; border:1px solid #1e3a5f;
  border-radius:6px; padding:5px 12px; white-space:nowrap; transition:all .15s;
  background: transparent; cursor: pointer; font-family: inherit;
}
.open-btn:hover { background:#1e3a5f; }



.empty-state {
  text-align:center; padding:60px 20px;
  color:#475569; font-size:0.9rem;
}
.empty-state .icon { font-size:2.5rem; margin-bottom:12px; }


.toast {
  position:fixed; bottom:24px; right:24px;
  background:#14532d; border:1px solid #22c55e;
  color:#86efac; border-radius:8px; padding:10px 18px;
  font-size:0.82rem; opacity:0; transition:opacity .3s;
  pointer-events:none; z-index:200;
}
.toast.show { opacity:1; }


/* ── PRIORITY ROW (auto-installed) ── */
.badge-pri { display:inline-flex;align-items:center;background:#7c5511;color:#fde68a;border:1px solid #b8860b;border-radius:3px;padding:1px 6px;font-size:0.7rem;font-weight:600;margin-left:6px;white-space:nowrap; }
tr.pri-day-row td { background:#3b2a0a26; }
tr.pri-day-row:hover td { background:#3b2a0a55; }
tr.pri-day-row td:first-child { border-left:3px solid #fbbf24; padding-left:11px; }
.chip[data-filter="priority"].active { background:#3b2a0a; border-color:#fbbf24; color:#fde68a; }

/* ── FOOTER ── */
.footer { margin-top:20px; font-size:0.74rem; color:#374151; display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px; }
</style>
</head>

    </thead>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- FOOTER -->

</div>

// ── RENDER ─────────────────────────────────────────────
function renderTable() {
  const q = document.getElementById('searchInput').value.toLowerCase();

  let filtered = records.filter(r => {
    const matchSearch = !q ||
      r.date.includes(q) ||
      (r.summary || '').toLowerCase().includes(q) ||
      (r.filename || '').toLowerCase().includes(q);
    const matchFilter =
      activeFilter === 'all' ||
      (activeFilter === 'high'   && r.high > 0) ||
      (activeFilter === 'urgent' && r.urgent > 0) ||
      (activeFilter === 'priority' && (r.priority || 0) > 0);
    return matchSearch && matchFilter;
  });

  // sort
  filtered.sort((a, b) => {
    let av = a[sortKey] ?? a.date;
    let bv = b[sortKey] ?? b.date;
    if (typeof av === 'string') av = av.toLowerCase();
    if (typeof bv === 'string') bv = bv.toLowerCase();
    if (av < bv) return sortDir === 'asc' ? -1 : 1;
    if (av > bv) return sortDir === 'asc' ? 1 : -1;
    return 0;
  });

  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';

  document.getElementById('emptyState').style.display = filtered.length === 0 ? 'block' : 'none';

  filtered.forEach(r => {
    const d = new Date(r.date + 'T00:00:00');
    const weekdays = ['日','一','二','三','四','五','六'];
    const weekday = weekdays[d.getDay()];
    const isToday = r.date === todayStr();

    const tr = document.createElement('tr');
    if ((r.priority || 0) > 0) tr.className = 'pri-day-row';
    tr.innerHTML = `
      <td>
        <div class="date-cell">${r.date}${isToday ? ' <span style="font-size:.67rem;background:#1e3a5f;color:#93c5fd;border:1px solid #3b82f6;border-radius:3px;padding:1px 6px;">今日</span>' : ''}${(r.priority || 0) > 0 ? ' <span class="badge-pri">⭐ ' + r.priority + '</span>' : ''}</div>
        <div class="date-sub">（週${weekday}）</div>
      </td>
      <td><strong style="color:#e2e8f0">${r.total}</strong> 件</td>
      <td>${r.high > 0 ? `<span class="tag-high">🟢 ${r.high}</span>` : '<span style="color:#374151">—</span>'}</td>
      <td>${r.mid  > 0 ? `<span class="tag-mid">🟡 ${r.mid}</span>`   : '<span style="color:#374151">—</span>'}</td>
      <td>${r.low  > 0 ? `<span class="tag-low">🔴 ${r.low}</span>`   : '<span style="color:#374151">—</span>'}</td>
      <td>${r.urgent > 0 ? `<span style="color:#fb923c;font-weight:600;">🔥 ${r.urgent}</span>` : '<span style="color:#374151">—</span>'}</td>
      <td><span class="budget-total">${r.budget ? Number(r.budget).toLocaleString() + '萬' : '—'}</span></td>
      <td style="max-width:220px;color:#94a3b8;font-size:0.79rem;">${r.summary || '—'}</td>
      <td>
        ${r.filename
          ? `<a class="open-btn" href="https://ormachang-git.github.io/tender-reports/reports/${r.filename}" target="_blank">📄 開啟報表</a>`
          : '<span style="color:#374151">—</span>'}
      </td>
    `;
    tbody.appendChild(tr);
  });

  updateStats();
  updateSortHeaders();
}

function updateStats() {
  const totals = records.reduce((acc, r) => ({
    total: acc.total + 1,
    high: acc.high + (r.high || 0),
    mid: acc.mid + (r.mid || 0),
    urgent: acc.urgent + (r.urgent || 0),
    priority: acc.priority + (r.priority || 0)
  }), { total: 0, high: 0, mid: 0, urgent: 0, priority: 0 });

  document.getElementById('statTotal').textContent  = totals.total;
  document.getElementById('statHigh').textContent   = totals.high;
  document.getElementById('statMid').textContent    = totals.mid;
  document.getElementById('statUrgent').textContent = totals.urgent;
  var _sp = document.getElementById('statPriority'); if (_sp) _sp.textContent = totals.priority;
}

function updateSortHeaders() {
  document.querySelectorAll('th').forEach(th => {
    th.classList.remove('sort-asc','sort-desc');
  });
  const ths = document.querySelectorAll('th');
  const keyMap = ['date','total','high','mid','low','urgent'];
  keyMap.forEach((k, i) => {
    if (k === sortKey) {
      ths[i].classList.add(sortDir === 'asc' ? 'sort-asc' : 'sort-desc');
    }
  });
}

// ── SORT / FILTER ──────────────────────────────────────
function sortBy(key) {
  if (sortKey === key) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
  else { sortKey = key; sortDir = 'desc'; }
  renderTable();
}

function setFilter(el) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  activeFilter = el.dataset.filter;
  renderTable();
}

// ── UTILS ──────────────────────────────────────────────
function todayStr() {
  const d = new Date();
  return d.toLocaleDateString('sv-SE'); // YYYY-MM-DD
}

function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = isError ? '#7f1d1d' : '#14532d';
  t.style.borderColor = isError ? '#ef4444' : '#22c55e';
  t.style.color = isError ? '#fca5a5' : '#86efac';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ── INIT ───────────────────────────────────────────────
document.getElementById('todayBadge').textContent = `📅 ${todayStr()}`;
document.getElementById('footerUpdated').textContent = `最後更新：${new Date().toLocaleString('zh-TW')}`;
renderTable();
</script>
<!-- PRIORITY_BLOCK_START -->
<style>
#priorityCards{margin:18px 0;padding:16px 20px;background:linear-gradient(135deg,#2a1f08,#3b2a0a);border:1px solid #b8860b;border-radius:10px;box-shadow:0 0 18px #b8860b22;}
#priorityCards .pc-head{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;margin-bottom:8px;}
#priorityCards .pc-title{color:#fbbf24;font-size:1rem;font-weight:700;}
#priorityCards .pc-sub{color:#fde68a;font-size:0.78rem;}
#priorityCards .pc-rule-label{color:#fbbf24;font-size:0.75rem;font-weight:600;margin-right:6px;}
#priorityCards .pc-rules{color:#c9a55a;font-size:0.72rem;line-height:1.55;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid #92651633;}
#priorityCards .pc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;}
#priorityCards .pc-card{background:#1a1308;border:1px solid #92651655;border-radius:7px;padding:10px 12px;text-decoration:none;display:block;transition:border-color .15s,transform .15s;}
#priorityCards .pc-card:hover{border-color:#fbbf24;transform:translateY(-1px);}
#priorityCards .pc-name{color:#fde68a;font-weight:600;font-size:0.86rem;line-height:1.35;margin-bottom:5px;}
#priorityCards .pc-meta{display:flex;justify-content:space-between;gap:8px;font-size:0.76rem;color:#94a3b8;margin-bottom:4px;}
#priorityCards .pc-budget{color:#fbbf24;font-weight:600;}
#priorityCards .pc-deadline{color:#a78b4f;font-size:0.7rem;}
#priorityCards .pc-deadline a{color:#fbbf24;text-decoration:none;}
#priorityCards .pc-empty{color:#a78b4f;font-size:0.8rem;text-align:center;padding:14px;}
</style>
<script>
(function(){
  var __PRI_LABEL="北捷復興崗";
  var __PRI_DESC="關鍵字：復興崗 ｜ 機關含：臺北大眾捷運";
  var __PRI_KW=["復興崗"];
  var __PRI_ORG_INC=["臺北大眾捷運"];
  var __PRI_ORG_EXC=[];
  var __PRI_BMIN=0;  // 萬，0 = 不啟用
  var __PRI_BMAX=0;  // 萬，0 = 不啟用
  var __PRI_DMIN=null;     // null = 不啟用
  var __PRI_DMAX=null;     // null = 不啟用
  function esc(s){return String(s||'').replace(/[&<>"']/g,function(c){return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];});}
  function matchesCurrentRule(p){
    var name=p.name||'',org=p.org||'';
    if(__PRI_KW.length && !__PRI_KW.some(function(k){return name.indexOf(k)!==-1;}))return false;
    if(__PRI_ORG_INC.length && !__PRI_ORG_INC.some(function(o){return org.indexOf(o)!==-1;}))return false;
    if(__PRI_ORG_EXC.length && __PRI_ORG_EXC.some(function(o){return org.indexOf(o)!==-1;}))return false;
    var budget=parseFloat(p.budget)||0;
    if(__PRI_BMIN && budget<__PRI_BMIN)return false;
    if(__PRI_BMAX && budget>__PRI_BMAX)return false;
    // days_left 是 record 寫入時的快照，已不準；不在 JS 端用 days 過濾。
    return true;
  }
  function init(){
    if(typeof records==='undefined')return;
    var today=new Date().toISOString().slice(0,10);
    var seen={},all=[];
    records.forEach(function(r){
      if(!r.priority_items)return;
      r.priority_items.forEach(function(p){
        var key=p.case_no||(p.name+'|'+p.org);
        if(seen[key])return;
        if(p.deadline_iso&&p.deadline_iso<today)return;
        if(!matchesCurrentRule(p))return;  // 按當前規則過濾，避免換規則後舊資料殘留
        seen[key]=true;
        p.report_date=r.date;
        p.report_filename=r.filename;
        all.push(p);
      });
    });
    all.sort(function(a,b){return (a.deadline_iso||'9999').localeCompare(b.deadline_iso||'9999');});
    all=all.slice(0,12);
    var section=document.createElement('section');
    section.id='priorityCards';
    var rulesHTML='<div class="pc-rules"><span class="pc-rule-label">'+esc(__PRI_LABEL)+'</span>'+esc(__PRI_DESC)+'</div>';
    if(all.length===0){
      section.innerHTML='<div class="pc-head"><span class="pc-title">⭐ 期間最優先追蹤</span></div>'+rulesHTML+'<div class="pc-empty">近期無未過期的最優先案件</div>';
    }else{
      var cards=all.map(function(p){
        return '<a class="pc-card" href="'+esc(p.link)+'" target="_blank">'+
          '<div class="pc-name">⭐ '+esc(p.name)+'</div>'+
          '<div class="pc-meta"><span>'+esc(p.org)+'</span><span class="pc-budget">'+esc(p.budget)+' 萬</span></div>'+
          '<div class="pc-deadline">截止 '+esc(p.deadline)+'（剩 '+esc(p.days_left)+' 天）　〈來自 <a href="reports/'+esc(p.report_filename)+'" target="_blank">'+esc(p.report_date)+' 日報</a>〉</div>'+
          '</a>';
      }).join('');
      section.innerHTML='<div class="pc-head"><div><span class="pc-title">⭐ 期間最優先追蹤</span> <span class="pc-sub">未過期最優先案件 '+all.length+' 筆（依截止日排序）</span></div></div>'+rulesHTML+'<div class="pc-grid">'+cards+'</div>';
    }
    var anchor=document.querySelector('.header')||document.querySelector('header')||document.querySelector('h1');
    if(anchor&&anchor.parentNode){anchor.parentNode.insertBefore(section,anchor.nextSibling);}
    else{document.body.insertBefore(section,document.body.firstChild);}
  }
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);
  else init();
})();
</script>
<!-- PRIORITY_BLOCK_END -->
